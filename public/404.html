  <style>
    /* ── Reset ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    /* ── Page ────────────────────────────────────────────────────────────── */
    html, body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #0c0f14;
      color: #f0e0c8;
      overflow: hidden;
    }
 
    /* ── Center content ──────────────────────────────────────────────────── */
    .page {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 2rem;
      text-align: center;
      z-index: 2;
    }
 
    /* ── 404 heading ─────────────────────────────────────────────────────── */
    .error-code {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 700;
      line-height: 1;
      /* Indigo to terracotta — matches dividerGradient dark token */
      background: linear-gradient(135deg, #818cf8, #d07858);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.04em;
    }
 
    /* ── Message ─────────────────────────────────────────────────────────── */
    .message {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: #a89070;
      max-width: 360px;
      line-height: 1.7;
    }
 
    /* ── Divider ─────────────────────────────────────────────────────────── */
    .divider {
      width: 80px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, #818cf8, #d07858);
      margin: 0.25rem 0;
    }
 
    /* ── Go Home button ──────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 0.5rem;
      padding: 12px 28px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #c86848, #d07858);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(200, 104, 72, 0.45);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }
 
    .btn:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 28px rgba(200, 104, 72, 0.60);
    }
 
    .btn:focus-visible {
      outline: 2px solid #818cf8;
      outline-offset: 3px;
    }
 
    /* ── Leaf container ──────────────────────────────────────────────────── */
    .leaves {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
 
    /* ── Individual leaf ─────────────────────────────────────────────────── */
    .leaf {
      position: absolute;
      top: -60px;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: leafFall linear infinite;
    }
 
    /* ── Leaf fall animation ─────────────────────────────────────────────── */
    @keyframes leafFall {
      0% {
        opacity: 0;
        transform: translateY(0) rotate(0deg) scale(1);
      }
      10% { opacity: 0.7; }
      90% { opacity: 0.4; }
      100% {
        opacity: 0;
        transform: translateY(110vh) rotate(720deg) scale(0.6);
      }
    }
 
    /* ── Sway left and right as they fall ───────────────────────────────── */
    @keyframes sway {
      0%, 100% { margin-left: 0; }
      25%       { margin-left: 40px; }
      75%       { margin-left: -40px; }
    }
 
    .leaf { animation: leafFall linear infinite, sway ease-in-out infinite; }
 
    /* ── Reduced motion — respect user preference ────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .leaf { animation: none; opacity: 0.15; }
    }
  </style>
</head>
